<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinTrack - Home</title>
    <link rel="stylesheet" href="css/homePageStyle.css">
    <script src="js/script.js"></script>
</head>
<body>
    <nav>
        <div class="logo">FINTRACK</div>
        <ul>
            <li><a href="/index.html">Home</a></li>
            <li><a href="/expensePage" id="expenseNavBtn">Expense</a></li>
            <li><a href="/income" id="incomeNavBtn">Income</a></li>
            <li><a href="/dashboard" id="dashboardNavBtn">Dashboard</a></li>
        </ul>
        <button class="logout-btn" id="logoutBtn" style="display:none;">Logout</button>
    </nav>

    <div class="container">
        <div class="content">
            <h1 id="welcome-message">Welcome! User</h1>
            <p id="para-msg">Ready to take Control of your Finance?</p>
            <button class="register-btn" id="registerBtn">Register</button>

            <div class="placeholder-image">
                <img src="/images/home page image.png" alt="Finance Image" class="welcome-image">
            </div>
        </div>

        <div class="cards-container">
            <div class="card-wrapper">
                <div class="card">
                    <img src="/images/income card.webp" alt="Income">
                </div>
                <button class="card-btn" id="income-btn">Income</button>
            </div>

            <div class="card-wrapper">
                <div class="card">
                    <img src="/images/expense card.webp" alt="Expense">
                </div>
                <button class="card-btn" id="expense-btn">Expense</button>
            </div>

            <div class="card-wrapper">
                <div class="card">
                    <img src="/images/dashboard card.webp" alt="Dashboard">
                </div>
                <button class="card-btn" id="dashboard-btn">Dashboard</button>
            </div>
        </div>
    </div>
</body>
</html>
