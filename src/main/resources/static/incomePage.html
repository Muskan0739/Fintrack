<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income Page - FinTrack</title>
    <link rel="stylesheet" href="css/incomePageStyle.css">
    <script src="https://kit.fontawesome.com/44370cae9b.js" crossorigin="anonymous"></script>
      <script src="js/incomeFilter.js"></script>
      <script src="js/income.js"></script>

</head>
<body>

    <nav>
        <div class="logo">FINTRACK</div>
        <ul>
            <li><a href="/index.html">Home</a></li>
            <li><a href="#" id="nav-expense">Expense</a></li>
            <li><a href="#" class="active">Income</a></li>
            <li><a href="#" id="nav-dashboard">Dashboard</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2 class="page-title">Income Record</h2>
        <hr/>

        <!-- Main Content Box -->
        <div class="content-box">

            <!-- Left Section -->
            <div class="left-section">
                
                <!-- Add Income Section -->
                <div class="add-income">
                    <h3>Add Income</h3>
                    <div class="inner-box">
                        <form id="form">
                        <input type="hidden" id="incomeId" name="id" />
                        
                            <label for="date">Date:</label>
                            <input type="date" id="date" name="date" required>
                            <span id="dateError" style="color:red;"></span>
                            
                            <label for="source">Source:</label>
                            <input type="text" id="source" name="source" required>
                             <span id="sourceError" style="color:red;"></span>
                            
                            <label for="amount">Amount:</label>
                            <input type="number" id="amount" name="amount" min ="1" required>
                             <span id="amountError" style="color:red;"></span>
                         

                            <button type="submit" class="add-btn" id="addBtn">Add</button>
                        </form>
                    </div>
                </div>

                <!-- Income Breakdown Section -->
                <div class="income-breakdown" id="income-source-card">
                    <h3>Income Breakdown</h3>
                    <div class="breakdown-content">
                       
                    </div>
                </div>
            </div>

            <!-- Right Section - Income Records Table -->
            <div class="right-section">
                <h3>Records</h3>
                <table id="table">
                    <thead>
                        <tr>
                            <th>
                                <div class="filter-wrapper">
                                <i class="fa-solid fa-filter filter-icon"></i>
                                <select id="categoryFilter" class="filter-dropdown">
                                    <option value="all">All Categories</option>
                                   
                                </select>
                            </div>
                            <span class="header-text">Date</span>
                        </th>
                            <th>Source</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="table-body">
                       
                    </tbody>
                </table>
            </div>

        </div>
    </div>

  
</body>
</html>
