<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Form</title>
    <link rel="stylesheet" href="css/expenseFormStyle.css">
    <script src= "js/expenseFormPost.js"></script>
</head>
<body>
    <div class="form-container">
        <form class="expense-form" id="form">
            <div class="form-group">
            <!-- hidden field- ID -->
            <input type="hidden" id="expense-id">
            
            <label for="category">Category:</label>
            <input type="text" id="category" name="category" required>
            <span id="categoryError" style="color:red;"></span>
            
            </div>

            <div class="form-group">
            <label for="date">Date:</label>
            <input type="date" id="date" name="date" required>
            <span id="dateError" style="color:red;"></span>
            </div>

            <div class="form-group">
            <label for="amount">Amount:</label>
            <input type="number" id="amount" name="amount" min="1" required>
            <span id="amountError" style="color:red;"></span>
            </div>

            <div class="form-group">
            <label for="note">Note:</label>
            <textarea id="note" name="note" rows="3"></textarea>
            </div>

            <button type="submit" class="add-button" id="add-expense">Add</button>
        </form>
    </div>
</body>
</html>
