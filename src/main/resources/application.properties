spring.application.name=fintrack

# Server 
server.port=${SERVER_PORT:8080}

# Database (MySQL)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fintrackdb}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:create-drop}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Must be >= 32 chars for HS256
jwt.secret=${JWT_SECRET:change_me_change_me_change_me_change_me_32_chars_min}
jwt.expiration-ms=${JWT_EXPIRATION_MS:36000000}
